<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Result - YMCA TESTSPHERE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-custom">
        <div class="container-fluid">
            <span class="navbar-brand"><i class="bi bi-trophy-fill me-2"></i>Test Result</span>
            <div class="ms-auto">
                <a href="dashboard.html" class="btn btn-outline-light btn-sm">
                    <i class="bi bi-house me-1"></i>Dashboard
                </a>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-7">
                <div class="card text-center">
                    <div class="card-body p-5">
                        <div id="resultCircle" class="result-circle mb-4">
                            <span id="scoreText">-</span>
                        </div>

                        <h3 id="resultTitle" class="fw-bold mb-1"></h3>
                        <p id="subjectLabel" class="text-muted mb-4"></p>

                        <div class="row g-3 mb-4">
                            <div class="col-4">
                                <div class="stat-card stat-blue p-3 rounded">
                                    <h4 id="totalQ">-</h4>
                                    <small>Total</small>
                                </div>
                            </div>
                            <div class="col-4">
                                <div class="stat-card stat-green p-3 rounded">
                                    <h4 id="correctQ">-</h4>
                                    <small>Correct</small>
                                </div>
                            </div>
                            <div class="col-4">
                                <div class="stat-card stat-red p-3 rounded">
                                    <h4 id="wrongQ">-</h4>
                                    <small>Wrong</small>
                                </div>
                            </div>
                        </div>

                        <div class="progress mb-4" style="height:12px;border-radius:6px;">
                            <div class="progress-bar bg-success" id="scoreBar" style="width:0%;transition:width 1s;"></div>
                        </div>

                        <p class="text-muted small" id="attemptDate"></p>

                        <div class="d-flex gap-3 justify-content-center mt-3">
                            <a href="dashboard.html" class="btn btn-gradient px-4">
                                <i class="bi bi-arrow-repeat me-2"></i>Practice Again
                            </a>
                            <a href="history.html" class="btn btn-outline-primary px-4">
                                <i class="bi bi-clock-history me-2"></i>View History
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/api.js"></script>
    <script>
        requireAuth('STUDENT');

        const result = JSON.parse(sessionStorage.getItem('testResult') || 'null');
        if (!result) { window.location.href = 'dashboard.html'; }

        const passed = result.score >= 50;
        const circle = document.getElementById('resultCircle');
        circle.classList.add(passed ? 'result-pass' : 'result-fail');
        document.getElementById('scoreText').textContent = result.score.toFixed(1) + '%';
        document.getElementById('resultTitle').textContent = passed ? '🎉 Congratulations!' : '📚 Keep Practicing!';
        document.getElementById('subjectLabel').textContent = result.subjectName;
        document.getElementById('totalQ').textContent = result.totalQuestions;
        document.getElementById('correctQ').textContent = result.correctAnswers;
        document.getElementById('wrongQ').textContent = result.wrongAnswers;
        document.getElementById('attemptDate').textContent = 'Attempted on: ' + new Date(result.attemptDate).toLocaleString();

        setTimeout(() => {
            document.getElementById('scoreBar').style.width = result.score + '%';
        }, 300);
    </script>
</body>
</html>
