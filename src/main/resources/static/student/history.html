<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test History - YMCA TESTSPHERE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-custom">
        <div class="container-fluid">
            <a class="navbar-brand" href="dashboard.html"><i class="bi bi-mortarboard-fill me-2"></i>YMCA TESTSPHERE</a>
            <div class="ms-auto d-flex gap-2">
                <a href="dashboard.html" class="btn btn-outline-light btn-sm">
                    <i class="bi bi-house me-1"></i>Dashboard
                </a>
                <button class="btn btn-light btn-sm" onclick="Auth.logout()">
                    <i class="bi bi-box-arrow-right me-1"></i>Logout
                </button>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        <div class="card">
            <div class="card-header bg-white py-3 d-flex align-items-center justify-content-between">
                <h5 class="mb-0"><i class="bi bi-clock-history text-primary me-2"></i>My Test History</h5>
                <span class="badge bg-primary" id="totalBadge">Loading...</span>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0 table-custom">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Subject</th>
                                <th>Total</th>
                                <th>Correct</th>
                                <th>Wrong</th>
                                <th>Score</th>
                                <th>Status</th>
                                <th>Date</th>
                            </tr>
                        </thead>
                        <tbody id="historyBody">
                            <tr><td colspan="8" class="text-center py-4">
                                <div class="spinner-border text-primary"></div>
                            </td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/api.js"></script>
    <script>
        requireAuth('STUDENT');

        async function loadHistory() {
            try {
                const history = await apiGet('/student/history');
                document.getElementById('totalBadge').textContent = history.length + ' Attempts';

                const tbody = document.getElementById('historyBody');
                if (history.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="8" class="text-center text-muted py-4">No tests attempted yet. <a href="dashboard.html">Start practicing!</a></td></tr>';
                    return;
                }

                tbody.innerHTML = history.map((h, i) => `
                    <tr>
                        <td>${i + 1}</td>
                        <td><span class="fw-semibold">${h.subjectName}</span></td>
                        <td>${h.totalQuestions}</td>
                        <td><span class="text-success fw-bold">${h.correctAnswers}</span></td>
                        <td><span class="text-danger fw-bold">${h.wrongAnswers}</span></td>
                        <td>
                            <div class="d-flex align-items-center gap-2">
                                <div class="progress flex-grow-1" style="height:6px;min-width:60px;">
                                    <div class="progress-bar ${h.score >= 50 ? 'bg-success' : 'bg-danger'}"
                                         style="width:${h.score}%"></div>
                                </div>
                                <span class="fw-bold">${h.score.toFixed(1)}%</span>
                            </div>
                        </td>
                        <td>
                            <span class="badge ${h.score >= 50 ? 'bg-success' : 'bg-danger'}">
                                ${h.score >= 50 ? 'Pass' : 'Fail'}
                            </span>
                        </td>
                        <td class="text-muted small">${new Date(h.attemptDate).toLocaleString()}</td>
                    </tr>
                `).join('');
            } catch (err) {
                showToast('Failed to load history: ' + err.message, 'error');
            }
        }

        loadHistory();
    </script>
</body>
</html>
