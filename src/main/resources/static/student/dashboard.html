<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard - YMCA TESTSPHERE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-custom">
        <div class="container-fluid">
            <a class="navbar-brand" href="#"><i class="bi bi-mortarboard-fill me-2"></i>YMCA TESTSPHERE</a>
            <div class="ms-auto d-flex align-items-center gap-3">
                <span class="text-white" id="welcomeMsg"></span>
                <a href="materials.html" class="btn btn-outline-light btn-sm">
                    <i class="bi bi-journal-text me-1"></i>Notes & PYQs
                </a>
                <a href="history.html" class="btn btn-outline-light btn-sm">
                    <i class="bi bi-clock-history me-1"></i>History
                </a>
                <button class="btn btn-light btn-sm" onclick="Auth.logout()">
                    <i class="bi bi-box-arrow-right me-1"></i>Logout
                </button>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        <div class="card mb-4 student-hero">
            <div class="card-body p-4">
                <div class="row g-4 align-items-center">
                    <div class="col-lg-8">
                        <div class="d-flex align-items-center gap-3 mb-2">
                            <div class="student-avatar" id="userAvatar">S</div>
                            <div>
                                <h4 class="mb-0 text-white fw-bold">Welcome back, <span id="welcomeName">Student</span> 👋</h4>
                                <small class="text-light">Your futuristic practice cockpit is ready</small>
                            </div>
                        </div>
                        <div class="d-flex flex-wrap gap-2 mt-3">
                            <button class="btn btn-light btn-sm" id="quickStartBtn">
                                <i class="bi bi-lightning-charge-fill me-1"></i>Quick Start Random Test
                            </button>
                            <a href="materials.html" class="btn btn-outline-light btn-sm">
                                <i class="bi bi-journal-text me-1"></i>Open Notes & PYQs
                            </a>
                            <a href="history.html" class="btn btn-outline-light btn-sm">
                                <i class="bi bi-clock-history me-1"></i>View Full History
                            </a>
                        </div>
                    </div>
                    <div class="col-lg-4">
                        <div class="hero-mini-grid">
                            <div class="hero-chip"><small>Current Time</small><strong id="liveClock">--:--</strong></div>
                            <div class="hero-chip"><small>Best Subject</small><strong id="bestSubject">-</strong></div>
                            <div class="hero-chip"><small>Pass Rate</small><strong id="passRate">-</strong></div>
                            <div class="hero-chip"><small>Trend</small><strong id="recentTrend">-</strong></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row g-3 mb-4" id="statsRow">
            <div class="col-md-4">
                <div class="stat-card stat-blue">
                    <h3 id="totalAttempts">-</h3>
                    <p><i class="bi bi-journal-check me-1"></i>Tests Attempted</p>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stat-card stat-green">
                    <h3 id="avgScore">-</h3>
                    <p><i class="bi bi-graph-up me-1"></i>Average Score</p>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stat-card stat-orange">
                    <h3 id="subjectCount">-</h3>
                    <p><i class="bi bi-book me-1"></i>Subjects Available</p>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header bg-white py-3">
                <div class="d-flex flex-wrap align-items-center justify-content-between gap-2">
                    <h5 class="mb-0"><i class="bi bi-grid-3x3-gap-fill text-primary me-2"></i>Choose a Subject to Practice</h5>
                    <div class="d-flex gap-2">
                        <input id="subjectSearch" class="form-control form-control-sm" style="min-width:220px;" placeholder="Search subject...">
                        <select id="subjectSort" class="form-select form-select-sm" style="min-width:170px;">
                            <option value="name">Sort: Name A-Z</option>
                            <option value="attempts">Sort: Most Attempted</option>
                            <option value="score">Sort: Best Avg Score</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="card-body">
                <div id="subjectList" class="row g-3">
                    <div class="col-12 text-center py-4">
                        <div class="spinner-border text-primary"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/api.js"></script>
    <script>
        requireAuth('STUDENT');

        const user = Auth.getUser();
        document.getElementById('welcomeMsg').textContent = 'Hi, ' + user.name;
        document.getElementById('welcomeName').textContent = user.name || 'Student';
        document.getElementById('userAvatar').textContent = (user.name || 'S').trim().charAt(0).toUpperCase();

        const subjectIcons = ['bi-code-slash', 'bi-diagram-3', 'bi-calculator', 'bi-lightbulb', 'bi-database', 'bi-cpu'];
        let subjectData = [];
        let historyData = [];

        async function loadDashboard() {
            try {
                const [subjects, history] = await Promise.all([
                    apiGet('/student/subjects'),
                    apiGet('/student/history')
                ]);

                subjectData = subjects;
                historyData = history;

                document.getElementById('subjectCount').textContent = subjects.length;
                document.getElementById('totalAttempts').textContent = history.length;

                const avg = history.length
                    ? (history.reduce((s, h) => s + h.score, 0) / history.length).toFixed(1) + '%'
                    : '0%';
                document.getElementById('avgScore').textContent = avg;

                fillInsights(history);
                renderSubjects();
            } catch (err) {
                showToast('Failed to load dashboard: ' + err.message, 'error');
            }
        }

        function fillInsights(history) {
            const bestSubjectEl = document.getElementById('bestSubject');
            const passRateEl = document.getElementById('passRate');
            const trendEl = document.getElementById('recentTrend');

            if (!history.length) {
                bestSubjectEl.textContent = 'No attempts';
                passRateEl.textContent = '0%';
                trendEl.textContent = 'Start now';
                return;
            }

            const grouped = {};
            history.forEach(h => {
                if (!grouped[h.subjectName]) grouped[h.subjectName] = { total: 0, count: 0 };
                grouped[h.subjectName].total += h.score;
                grouped[h.subjectName].count += 1;
            });

            let best = { name: '-', avg: -1 };
            Object.keys(grouped).forEach(name => {
                const val = grouped[name].total / grouped[name].count;
                if (val > best.avg) best = { name, avg: val };
            });
            bestSubjectEl.textContent = best.name;

            const pass = history.filter(h => h.score >= 50).length;
            passRateEl.textContent = Math.round((pass / history.length) * 100) + '%';

            const recent = history.slice(0, 3).map(h => h.score);
            if (recent.length >= 2) {
                const slope = recent[0] - recent[recent.length - 1];
                if (slope > 2) trendEl.textContent = 'Improving ↑';
                else if (slope < -2) trendEl.textContent = 'Needs focus ↓';
                else trendEl.textContent = 'Stable →';
            } else {
                trendEl.textContent = 'Collecting data';
            }
        }

        function renderSubjects() {
            const list = document.getElementById('subjectList');
            const search = (document.getElementById('subjectSearch').value || '').trim().toLowerCase();
            const sort = document.getElementById('subjectSort').value;

            const attemptsBySubject = {};
            historyData.forEach(h => {
                if (!attemptsBySubject[h.subjectName]) attemptsBySubject[h.subjectName] = { count: 0, total: 0 };
                attemptsBySubject[h.subjectName].count += 1;
                attemptsBySubject[h.subjectName].total += h.score;
            });

            let items = subjectData.filter(s => s.subjectName.toLowerCase().includes(search));

            if (sort === 'name') {
                items.sort((a, b) => a.subjectName.localeCompare(b.subjectName));
            } else if (sort === 'attempts') {
                items.sort((a, b) =>
                    (attemptsBySubject[b.subjectName]?.count || 0) - (attemptsBySubject[a.subjectName]?.count || 0)
                );
            } else if (sort === 'score') {
                items.sort((a, b) => {
                    const aMeta = attemptsBySubject[a.subjectName];
                    const bMeta = attemptsBySubject[b.subjectName];
                    const aAvg = aMeta ? aMeta.total / aMeta.count : -1;
                    const bAvg = bMeta ? bMeta.total / bMeta.count : -1;
                    return bAvg - aAvg;
                });
            }

            if (items.length === 0) {
                list.innerHTML = '<div class="col-12 text-center text-muted py-4">No matching subjects found.</div>';
                return;
            }

            list.innerHTML = items.map((s, i) => {
                const meta = attemptsBySubject[s.subjectName];
                const attempts = meta ? meta.count : 0;
                const avg = meta ? (meta.total / meta.count).toFixed(1) + '%' : 'No data';
                return `
                    <div class="col-md-4 col-sm-6">
                        <div class="card subject-card h-100" onclick="startTest(${s.id}, '${s.subjectName.replace(/'/g, "\\'")}')">
                            <div class="card-body d-flex align-items-center gap-3">
                                <div class="rounded-circle d-flex align-items-center justify-content-center"
                                     style="width:50px;height:50px;background:#eef2ff;">
                                    <i class="bi ${subjectIcons[i % subjectIcons.length]} text-primary fs-4"></i>
                                </div>
                                <div class="flex-grow-1">
                                    <h6 class="mb-0 fw-bold">${s.subjectName}</h6>
                                    <small class="text-muted">Attempts: ${attempts} · Avg: ${avg}</small>
                                </div>
                                <i class="bi bi-arrow-right-circle ms-auto text-primary fs-5"></i>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function startTest(subjectId, subjectName) {
            sessionStorage.setItem('testSubjectId', subjectId);
            sessionStorage.setItem('testSubjectName', subjectName);
            window.location.href = 'test.html';
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('liveClock').textContent = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        document.getElementById('quickStartBtn').addEventListener('click', () => {
            if (!subjectData.length) {
                showToast('No subjects available yet', 'error');
                return;
            }
            const random = subjectData[Math.floor(Math.random() * subjectData.length)];
            startTest(random.id, random.subjectName);
        });

        document.getElementById('subjectSearch').addEventListener('input', renderSubjects);
        document.getElementById('subjectSort').addEventListener('change', renderSubjects);

        updateClock();
        setInterval(updateClock, 1000);
        loadDashboard();
    </script>
</body>
</html>
