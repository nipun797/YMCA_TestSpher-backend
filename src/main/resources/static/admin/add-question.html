<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Question - YMCA TESTSPHERE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
    <div class="d-flex">
        <!-- Sidebar -->
        <div class="sidebar d-none d-md-flex flex-column" style="width:240px;min-width:240px;">
            <div class="text-white text-center py-3 px-3 border-bottom border-white border-opacity-25">
                <i class="bi bi-mortarboard-fill fs-3"></i>
                <div class="fw-bold mt-1">YMCA Admin</div>
            </div>
            <nav class="nav flex-column mt-2">
                <a href="dashboard.html" class="nav-link"><i class="bi bi-speedometer2"></i>Dashboard</a>
                <a href="add-subject.html" class="nav-link"><i class="bi bi-plus-circle"></i>Add Subject</a>
                <a href="add-question.html" class="nav-link active"><i class="bi bi-question-circle"></i>Add Question</a>
                <a href="view-questions.html" class="nav-link"><i class="bi bi-list-ul"></i>View Questions</a>
                <a href="view-results.html" class="nav-link"><i class="bi bi-bar-chart"></i>Student Results</a>
            </nav>
            <div class="mt-auto p-3">
                <button class="btn btn-outline-light btn-sm w-100" onclick="Auth.logout()">
                    <i class="bi bi-box-arrow-right me-1"></i>Logout
                </button>
            </div>
        </div>

        <div class="flex-grow-1">
            <nav class="navbar navbar-custom px-3">
                <span class="navbar-brand">Add Question</span>
            </nav>

            <div class="container-fluid p-4">
                <div class="card" style="max-width:700px;">
                    <div class="card-header bg-white fw-semibold">
                        <i class="bi bi-question-circle text-primary me-2"></i>New Question
                    </div>
                    <div class="card-body">
                        <form id="questionForm" novalidate>
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Subject <span class="text-danger">*</span></label>
                                <select id="subjectId" class="form-select" required>
                                    <option value="">-- Select Subject --</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-semibold">Question Type <span class="text-danger">*</span></label>
                                <select id="questionType" class="form-select" required>
                                    <option value="MCQ" selected>Multiple Choice (MCQ)</option>
                                    <option value="TEXT">Text Answer</option>
                                </select>
                                <div class="form-text">MCQ is auto-graded by A/B/C/D. Text Answer is auto-graded by matching the expected answer.</div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-semibold">Question Text <span class="text-danger">*</span></label>
                                <textarea id="questionText" class="form-control" rows="3"
                                          placeholder="Enter the question..." required></textarea>
                            </div>

                            <div class="row g-3 mb-3" id="mcqOptions">
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold">
                                        <span class="badge bg-primary me-1">A</span> Option A
                                    </label>
                                    <input type="text" id="optionA" class="form-control" placeholder="Option A" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold">
                                        <span class="badge bg-secondary me-1">B</span> Option B
                                    </label>
                                    <input type="text" id="optionB" class="form-control" placeholder="Option B" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold">
                                        <span class="badge bg-secondary me-1">C</span> Option C
                                    </label>
                                    <input type="text" id="optionC" class="form-control" placeholder="Option C" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold">
                                        <span class="badge bg-secondary me-1">D</span> Option D
                                    </label>
                                    <input type="text" id="optionD" class="form-control" placeholder="Option D" required>
                                </div>
                            </div>

                            <div class="mb-4" id="mcqCorrectBlock">
                                <label class="form-label fw-semibold">Correct Answer <span class="text-danger">*</span></label>
                                <div class="d-flex gap-3 flex-wrap">
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" name="correct" id="ca" value="A" required>
                                        <label class="form-check-label" for="ca"><span class="badge bg-success">A</span></label>
                                    </div>
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" name="correct" id="cb" value="B">
                                        <label class="form-check-label" for="cb"><span class="badge bg-success">B</span></label>
                                    </div>
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" name="correct" id="cc" value="C">
                                        <label class="form-check-label" for="cc"><span class="badge bg-success">C</span></label>
                                    </div>
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" name="correct" id="cd" value="D">
                                        <label class="form-check-label" for="cd"><span class="badge bg-success">D</span></label>
                                    </div>
                                </div>
                            </div>

                            <div class="mb-4 d-none" id="textCorrectBlock">
                                <label class="form-label fw-semibold">Expected Answer <span class="text-danger">*</span></label>
                                <input type="text" id="textCorrectAnswer" class="form-control"
                                       placeholder="Expected answer (used for auto-checking)" />
                                <div class="form-text">Student answer is matched case-insensitively.</div>
                            </div>

                            <div class="mb-4">
                                <label class="form-label fw-semibold">Attachment (optional)</label>
                                <input type="file" id="attachment" class="form-control" accept="image/*,application/pdf">
                                <div class="form-text">You can attach an image or a PDF for this question.</div>
                            </div>

                            <div id="alertBox" class="alert d-none"></div>

                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-gradient flex-grow-1" id="submitBtn">
                                    <i class="bi bi-plus-square me-2"></i>Add Question
                                </button>
                                <button type="reset" class="btn btn-outline-secondary">
                                    <i class="bi bi-arrow-counterclockwise"></i>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/api.js"></script>
    <script>
        requireAuth('ADMIN');

        async function loadSubjects() {
            try {
                const subjects = await apiGet('/admin/subjects');
                const select = document.getElementById('subjectId');
                subjects.forEach(s => {
                    const opt = document.createElement('option');
                    opt.value = s.id;
                    opt.textContent = s.subjectName;
                    select.appendChild(opt);
                });
            } catch (err) {
                showToast('Failed to load subjects', 'error');
            }
        }

        document.getElementById('questionForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const alertBox = document.getElementById('alertBox');
            const btn = document.getElementById('submitBtn');
            const type = document.getElementById('questionType').value;

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Adding...';

            const fd = new FormData();
            fd.append('subjectId', document.getElementById('subjectId').value);
            fd.append('questionText', document.getElementById('questionText').value.trim());
            fd.append('questionType', type);

            if (type === 'MCQ') {
                const correctAnswer = document.querySelector('input[name="correct"]:checked');
                if (!correctAnswer) {
                    alertBox.className = 'alert alert-danger';
                    alertBox.textContent = 'Please select the correct answer.';
                    btn.disabled = false;
                    btn.innerHTML = '<i class="bi bi-plus-square me-2"></i>Add Question';
                    return;
                }
                fd.append('optionA', document.getElementById('optionA').value.trim());
                fd.append('optionB', document.getElementById('optionB').value.trim());
                fd.append('optionC', document.getElementById('optionC').value.trim());
                fd.append('optionD', document.getElementById('optionD').value.trim());
                fd.append('correctAnswer', correctAnswer.value);
            } else if (type === 'TEXT') {
                const expected = document.getElementById('textCorrectAnswer').value.trim();
                if (!expected) {
                    alertBox.className = 'alert alert-danger';
                    alertBox.textContent = 'Please enter the expected answer.';
                    btn.disabled = false;
                    btn.innerHTML = '<i class="bi bi-plus-square me-2"></i>Add Question';
                    return;
                }
                fd.append('correctAnswer', expected);
            }

            const file = document.getElementById('attachment').files[0];
            if (file) fd.append('attachment', file);

            try {
                await apiPostForm('/admin/questions', fd);
                alertBox.className = 'alert alert-success';
                alertBox.textContent = 'Question added successfully!';
                document.getElementById('questionForm').reset();
            } catch (err) {
                alertBox.className = 'alert alert-danger';
                alertBox.textContent = err.message;
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="bi bi-plus-square me-2"></i>Add Question';
            }
        });

        function syncTypeUI() {
            const type = document.getElementById('questionType').value;
            const mcqOptions = document.getElementById('mcqOptions');
            const mcqCorrect = document.getElementById('mcqCorrectBlock');
            const textCorrect = document.getElementById('textCorrectBlock');
            const isMcq = type === 'MCQ';

            mcqOptions.classList.toggle('d-none', !isMcq);
            mcqCorrect.classList.toggle('d-none', !isMcq);
            textCorrect.classList.toggle('d-none', isMcq);

            ['optionA','optionB','optionC','optionD'].forEach(id => {
                const el = document.getElementById(id);
                if (el) el.required = isMcq;
            });
            const textEl = document.getElementById('textCorrectAnswer');
            if (textEl) textEl.required = !isMcq;

            document.querySelectorAll('input[name="correct"]').forEach(r => { r.required = isMcq; });
        }

        document.getElementById('questionType').addEventListener('change', syncTypeUI);

        loadSubjects();
        syncTypeUI();
    </script>
</body>
</html>
