spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/pyq_portal?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:1234}
jwt.secret=${JWT_SECRET:pyqPortalSecretKey2024SuperSecureKeyForJWTTokenGeneration}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Disable schema.sql on startup (Hibernate updates schema via ddl-auto=update)
spring.sql.init.mode=never

jwt.expiration=86400000

server.port=${PORT:8080}

# Upload limits (for PDFs/notes)
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB