spring.datasource.url=jdbc:mysql://localhost:3306/pyq_portal?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Disable schema.sql on startup (Hibernate updates schema via ddl-auto=update)
spring.sql.init.mode=never

jwt.secret=pyqPortalSecretKey2024SuperSecureKeyForJWTTokenGeneration
jwt.expiration=86400000

server.port=8080

# Upload limits (for PDFs/notes)
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
