<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Results - YMCA TESTSPHERE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
<div class="d-flex">
    <!-- Sidebar -->
    <div class="sidebar d-none d-md-flex flex-column" style="width:240px;min-width:240px;">
        <div class="text-white text-center py-3 px-3 border-bottom border-white border-opacity-25">
            <i class="bi bi-mortarboard-fill fs-3"></i>
            <div class="fw-bold mt-1">YMCA Admin</div>
        </div>
        <nav class="nav flex-column mt-2">
            <a href="dashboard.html" class="nav-link"><i class="bi bi-speedometer2"></i>Dashboard</a>
            <a href="add-subject.html" class="nav-link"><i class="bi bi-plus-circle"></i>Add Subject</a>
            <a href="add-question.html" class="nav-link"><i class="bi bi-question-circle"></i>Add Question</a>
            <a href="view-questions.html" class="nav-link"><i class="bi bi-list-ul"></i>View Questions</a>
            <a href="view-results.html" class="nav-link active"><i class="bi bi-bar-chart"></i>Student Results</a>
        </nav>
        <div class="mt-auto p-3">
            <button class="btn btn-outline-light btn-sm w-100" onclick="Auth.logout()">
                <i class="bi bi-box-arrow-right me-1"></i>Logout
            </button>
        </div>
    </div>

    <div class="flex-grow-1">
        <nav class="navbar navbar-custom px-3">
            <span class="navbar-brand">Student Results</span>
        </nav>

        <div class="container-fluid p-4">
            <!-- Summary stats -->
            <div class="row g-3 mb-4">
                <div class="col-md-3 col-6">
                    <div class="stat-card stat-blue">
                        <h3 id="totalAttempts">-</h3>
                        <p><i class="bi bi-journal-check me-1"></i>Total Attempts</p>
                    </div>
                </div>
                <div class="col-md-3 col-6">
                    <div class="stat-card stat-green">
                        <h3 id="passCount">-</h3>
                        <p><i class="bi bi-check-circle me-1"></i>Passed</p>
                    </div>
                </div>
                <div class="col-md-3 col-6">
                    <div class="stat-card stat-red">
                        <h3 id="failCount">-</h3>
                        <p><i class="bi bi-x-circle me-1"></i>Failed</p>
                    </div>
                </div>
                <div class="col-md-3 col-6">
                    <div class="stat-card stat-orange">
                        <h3 id="avgScore">-</h3>
                        <p><i class="bi bi-graph-up me-1"></i>Avg Score</p>
                    </div>
                </div>
            </div>

            <!-- Filter bar -->
            <div class="card mb-4">
                <div class="card-body d-flex flex-wrap gap-3 align-items-end">
                    <div>
                        <label class="form-label fw-semibold mb-1">Filter by Subject</label>
                        <select id="filterSubject" class="form-select" style="min-width:180px;">
                            <option value="">All Subjects</option>
                        </select>
                    </div>
                    <div>
                        <label class="form-label fw-semibold mb-1">Filter by Status</label>
                        <select id="filterStatus" class="form-select">
                            <option value="">All</option>
                            <option value="pass">Pass (≥50%)</option>
                            <option value="fail">Fail (&lt;50%)</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Results table -->
            <div class="card">
                <div class="card-header bg-white d-flex justify-content-between align-items-center">
                    <span class="fw-semibold"><i class="bi bi-table text-primary me-2"></i>All Attempts</span>
                    <span class="badge bg-primary" id="countBadge">0</span>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0 table-custom">
                            <thead>
                                <tr>
                                    <th>#</th>
                                    <th>Student</th>
                                    <th>Subject</th>
                                    <th>Total Q</th>
                                    <th>Correct</th>
                                    <th>Wrong</th>
                                    <th>Score</th>
                                    <th>Status</th>
                                    <th>Date</th>
                                </tr>
                            </thead>
                            <tbody id="resultsBody">
                                <tr><td colspan="8" class="text-center py-4">
                                    <div class="spinner-border text-primary"></div>
                                </td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/api.js"></script>
<script>
    requireAuth('ADMIN');

    let allResults = [];

    async function loadResults() {
        try {
            const [results, subjects] = await Promise.all([
                apiGet('/admin/results'),
                apiGet('/admin/subjects')
            ]);
            allResults = results;

            // Populate subject filter
            const sel = document.getElementById('filterSubject');
            subjects.forEach(s => {
                const opt = document.createElement('option');
                opt.value = s.subjectName;
                opt.textContent = s.subjectName;
                sel.appendChild(opt);
            });

            // Summary stats
            const pass = results.filter(r => r.score >= 50).length;
            const fail = results.length - pass;
            const avg = results.length
                ? (results.reduce((s, r) => s + r.score, 0) / results.length).toFixed(1) + '%'
                : '0%';

            document.getElementById('totalAttempts').textContent = results.length;
            document.getElementById('passCount').textContent = pass;
            document.getElementById('failCount').textContent = fail;
            document.getElementById('avgScore').textContent = avg;

            renderTable(results);
        } catch (err) {
            showToast('Failed to load results: ' + err.message, 'error');
        }
    }

    function renderTable(results) {
        document.getElementById('countBadge').textContent = results.length;
        const tbody = document.getElementById('resultsBody');
        if (results.length === 0) {
            tbody.innerHTML = '<tr><td colspan="8" class="text-center text-muted py-4">No results found.</td></tr>';
            return;
        }
        tbody.innerHTML = results.map((r, i) => `
            <tr>
                <td>${i + 1}</td>
                <td><span class="fw-semibold">${r.studentName || '-'}</span></td>
                <td><span class="fw-semibold">${r.subjectName}</span></td>
                <td>${r.totalQuestions}</td>
                <td><span class="text-success fw-bold">${r.correctAnswers}</span></td>
                <td><span class="text-danger fw-bold">${r.wrongAnswers}</span></td>
                <td>
                    <div class="d-flex align-items-center gap-2">
                        <div class="progress flex-grow-1" style="height:6px;min-width:60px;">
                            <div class="progress-bar ${r.score >= 50 ? 'bg-success' : 'bg-danger'}"
                                 style="width:${r.score}%"></div>
                        </div>
                        <span class="fw-bold">${r.score.toFixed(1)}%</span>
                    </div>
                </td>
                <td>
                    <span class="badge ${r.score >= 50 ? 'bg-success' : 'bg-danger'}">
                        ${r.score >= 50 ? 'Pass' : 'Fail'}
                    </span>
                </td>
                <td class="text-muted small">${new Date(r.attemptDate).toLocaleString()}</td>
            </tr>
        `).join('');
    }

    function applyFilters() {
        const subjectFilter = document.getElementById('filterSubject').value;
        const statusFilter = document.getElementById('filterStatus').value;
        let filtered = allResults;
        if (subjectFilter) filtered = filtered.filter(r => r.subjectName === subjectFilter);
        if (statusFilter === 'pass') filtered = filtered.filter(r => r.score >= 50);
        if (statusFilter === 'fail') filtered = filtered.filter(r => r.score < 50);
        renderTable(filtered);
    }

    document.getElementById('filterSubject').addEventListener('change', applyFilters);
    document.getElementById('filterStatus').addEventListener('change', applyFilters);

    loadResults();
</script>
</body>
</html>
