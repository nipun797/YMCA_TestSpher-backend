<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes & PYQs - YMCA TESTSPHERE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-custom">
    <div class="container-fluid">
        <a class="navbar-brand" href="dashboard.html"><i class="bi bi-mortarboard-fill me-2"></i>YMCA TESTSPHERE</a>
        <div class="ms-auto d-flex gap-2">
            <a href="dashboard.html" class="btn btn-outline-light btn-sm">
                <i class="bi bi-house me-1"></i>Dashboard
            </a>
            <a href="history.html" class="btn btn-outline-light btn-sm">
                <i class="bi bi-clock-history me-1"></i>History
            </a>
            <button class="btn btn-light btn-sm" onclick="Auth.logout()">
                <i class="bi bi-box-arrow-right me-1"></i>Logout
            </button>
        </div>
    </div>
</nav>

<div class="container py-4">
    <!-- Subject selection view -->
    <div id="subjectView" class="d-none">
        <div class="card mb-4">
            <div class="card-header bg-white py-3">
                <div class="d-flex flex-wrap align-items-center justify-content-between gap-2">
                    <h5 class="mb-0"><i class="bi bi-grid-3x3-gap-fill text-primary me-2"></i>Choose a Subject for Notes</h5>
                    <div class="d-flex gap-2">
                        <input id="subjectSearch" class="form-control form-control-sm" style="min-width:220px;" placeholder="Search subject...">
                        <select id="subjectSort" class="form-select form-select-sm" style="min-width:170px;">
                            <option value="name">Sort: Name A-Z</option>
                            <option value="notes">Sort: Most Notes</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="card-body">
                <div id="subjectList" class="row g-3">
                    <div class="col-12 text-center py-4">
                        <div class="spinner-border text-primary"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Notes view (when subject selected) -->
    <div id="notesView" class="d-none">
        <div class="mb-3">
            <a href="materials.html" class="btn btn-outline-secondary btn-sm">
                <i class="bi bi-arrow-left me-1"></i>Back to Subjects
            </a>
        </div>
        <div class="card mb-4">
            <div class="card-header bg-white fw-semibold d-flex align-items-center justify-content-between">
                <span><i class="bi bi-journal-text text-primary me-2"></i><span id="notesSubjectName">Subject Notes</span></span>
                <span class="badge bg-primary" id="notesCountBadge">0</span>
            </div>
            <div class="card-body">
                <div class="mb-3">
                    <input type="text" id="searchInput" class="form-control" placeholder="Search notes...">
                </div>
            </div>
        </div>
        <div class="row g-3" id="materialCards">
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/api.js"></script>
<script>
    requireAuth('STUDENT');

    const subjectIcons = ['bi-code-slash', 'bi-diagram-3', 'bi-calculator', 'bi-lightbulb', 'bi-database', 'bi-cpu'];
    let allMaterials = [];
    let allSubjects = [];

    function getSubjectIdFromUrl() {
        const params = new URLSearchParams(window.location.search);
        const id = params.get('subjectId');
        return id ? parseInt(id, 10) : null;
    }

    function getNotesCountBySubject() {
        const counts = {};
        allMaterials.forEach(m => {
            if (m.subject) {
                const id = m.subject.id;
                counts[id] = (counts[id] || 0) + 1;
            }
        });
        return counts;
    }

    async function loadSubjects() {
        try {
            allSubjects = await apiGet('/student/subjects');
        } catch (e) {
            showToast('Failed to load subjects', 'error');
        }
    }

    async function loadMaterials() {
        try {
            allMaterials = await apiGet('/student/materials');
        } catch (e) {
            showToast('Failed to load materials: ' + e.message, 'error');
        }
    }

    function renderSubjectCards() {
        const list = document.getElementById('subjectList');
        const search = (document.getElementById('subjectSearch').value || '').trim().toLowerCase();
        const sort = document.getElementById('subjectSort').value;
        const counts = getNotesCountBySubject();

        let items = allSubjects.filter(s => s.subjectName.toLowerCase().includes(search));

        if (sort === 'name') {
            items.sort((a, b) => a.subjectName.localeCompare(b.subjectName));
        } else if (sort === 'notes') {
            items.sort((a, b) => (counts[b.id] || 0) - (counts[a.id] || 0));
        }

        if (items.length === 0) {
            list.innerHTML = '<div class="col-12 text-center text-muted py-4">No matching subjects found.</div>';
            return;
        }

        list.innerHTML = items.map((s, i) => {
            const notesCount = counts[s.id] || 0;
            const url = 'materials.html?subjectId=' + s.id;
            return `
                <div class="col-md-4 col-sm-6">
                    <div class="card subject-card h-100" onclick="location.href='${url}'">
                        <div class="card-body d-flex align-items-center gap-3">
                            <div class="rounded-circle d-flex align-items-center justify-content-center"
                                 style="width:50px;height:50px;background:#eef2ff;">
                                <i class="bi ${subjectIcons[i % subjectIcons.length]} text-primary fs-4"></i>
                            </div>
                            <div class="flex-grow-1">
                                <h6 class="mb-0 fw-bold">${s.subjectName}</h6>
                                <small class="text-muted">Notes: ${notesCount}</small>
                            </div>
                            <i class="bi bi-arrow-right-circle ms-auto text-primary fs-5"></i>
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    }

    function renderNotesList(subjectId) {
        const subject = allSubjects.find(s => s.id == subjectId);
        const subjectName = subject ? subject.subjectName : 'Subject';
        document.getElementById('notesSubjectName').textContent = subjectName + ' - Notes & PYQs';

        const q = (document.getElementById('searchInput').value || '').toLowerCase();
        let list = allMaterials.filter(m => m.subject && m.subject.id == subjectId);
        if (q) {
            list = list.filter(m =>
                (m.title || '').toLowerCase().includes(q) ||
                (m.description || '').toLowerCase().includes(q)
            );
        }

        document.getElementById('notesCountBadge').textContent = list.length;
        const wrap = document.getElementById('materialCards');

        if (list.length === 0) {
            wrap.innerHTML = '<div class="col-12 text-center text-muted py-5">No notes found for this subject.</div>';
            return;
        }

        wrap.innerHTML = list.map(m => {
            const isPdf = (m.fileMime || '') === 'application/pdf';
            const desc = (m.description || '').trim();
            return `
                <div class="col-md-6 col-lg-4">
                    <div class="card h-100">
                        <div class="card-body">
                            <div class="d-flex align-items-start gap-2 mb-2">
                                <div class="rounded-circle d-flex align-items-center justify-content-center"
                                     style="width:42px;height:42px;background:#eef2ff;">
                                    <i class="bi ${isPdf ? 'bi-file-earmark-pdf' : 'bi-image'} text-primary fs-5"></i>
                                </div>
                                <div class="flex-grow-1">
                                    <div class="fw-bold">${m.title}</div>
                                </div>
                            </div>
                            ${desc ? `<div class="text-muted small mb-3">${desc}</div>` : ''}
                            <div class="d-flex gap-2">
                                <a href="${m.filePath}" target="_blank" rel="noopener" class="btn btn-outline-secondary btn-sm">
                                    <i class="bi bi-box-arrow-up-right me-1"></i>Open
                                </a>
                                <button class="btn btn-gradient btn-sm" onclick="downloadMaterial(${m.id})">
                                    <i class="bi bi-download me-1"></i>Download
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    }

    function applyNotesFilter() {
        const subjectId = getSubjectIdFromUrl();
        if (subjectId) renderNotesList(subjectId);
    }

    document.getElementById('subjectSearch').addEventListener('input', renderSubjectCards);
    document.getElementById('subjectSort').addEventListener('change', renderSubjectCards);
    document.getElementById('searchInput').addEventListener('input', applyNotesFilter);

    async function downloadMaterial(id) {
        try {
            const m = allMaterials.find(x => x.id === id);
            const filename = (m && m.fileName) ? m.fileName : 'material';
            await apiDownload('/student/materials/' + id + '/download', filename);
        } catch (e) {
            showToast('Download failed: ' + e.message, 'error');
        }
    }

    async function init() {
        await Promise.all([loadSubjects(), loadMaterials()]);

        const subjectId = getSubjectIdFromUrl();
        if (subjectId) {
            document.getElementById('subjectView').classList.add('d-none');
            document.getElementById('notesView').classList.remove('d-none');
            renderNotesList(subjectId);
        } else {
            document.getElementById('subjectView').classList.remove('d-none');
            document.getElementById('notesView').classList.add('d-none');
            renderSubjectCards();
        }
    }

    init();
</script>
</body>
</html>
